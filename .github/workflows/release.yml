name: Release

on:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/dotfiles-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/dotfiles

      - uses: actions/upload-artifact@v4
        with:
          name: dotfiles-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: "!startsWith(github.ref, 'refs/tags/v')"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update latest release
        if: "!startsWith(github.ref, 'refs/tags/v')"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f latest ${{ github.sha }}
          git push -f origin latest
          if gh release view latest -R ${{ github.repository }} >/dev/null 2>&1; then
            gh release upload latest artifacts/* --clobber -R ${{ github.repository }}
            gh release edit latest --draft=false --notes "Auto-built from ${{ github.sha }}" -R ${{ github.repository }}
          else
            gh release create latest artifacts/* --prerelease --title "Latest Build" \
              --notes "Auto-built from ${{ github.sha }}" -R ${{ github.repository }}
          fi

      - name: Create tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
